name: Publish Docker image

on:
  workflow_call:
    inputs:
      ref:
        description: Git tag or commit to publish
        required: true
        type: string

env:
  DOCKERHUB_NAMESPACE: ${{ vars.DOCKERHUB_NAMESPACE || 'zacharmstrong' }}

jobs:
  deploy-docker:
    name: Deploy Docker Hub
    runs-on: ubuntu-latest
    steps:
      - name: Checkout source
        uses: actions/checkout@v6
        with:
          ref: ${{ inputs.ref }}

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Login to DockerHub
        uses: docker/login-action@v4
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_TOKEN }}

      - name: Docker meta
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: |
            ${{ env.DOCKERHUB_NAMESPACE }}/twitch-channel-points-miner
            ${{ env.DOCKERHUB_NAMESPACE }}/twitch-channel-points-miner-v2
          tags: |
            type=semver,pattern={{version}},value=${{ inputs.ref }}
            type=raw,value=latest

      - name: Build and push AMD64 and ARM64
        id: docker_build
        uses: docker/build-push-action@v7
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          platforms: linux/amd64,linux/arm64
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Update Docker Hub description
        uses: peter-evans/dockerhub-description@v5
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_TOKEN }}
          repository: ${{ env.DOCKERHUB_NAMESPACE }}/twitch-channel-points-miner
          short-description: Automatically earn Twitch channel points, claim Drops, and manage predictions.
          readme-filepath: ./DOCKERHUB.md

      - name: Add Docker image to GitHub release notes
        env:
          GH_TOKEN: ${{ github.token }}
          RELEASE_TAG: ${{ inputs.ref }}
        shell: bash
        run: |
          version="${RELEASE_TAG#Twitch-Channel-Points-Miner-v2-}"
          version="${version#v}"
          release_notes=$(gh release view "${RELEASE_TAG}" --json body --jq '.body')
          release_notes=$(printf '%s\n' "${release_notes}" | sed '/<!-- docker-image:start -->/,/<!-- docker-image:end -->/d')
          docker_notes=$(cat <<EOF
          <!-- docker-image:start -->
          ### Docker image

          * [\`zacharmstrong/twitch-channel-points-miner:${version}\`](https://hub.docker.com/r/zacharmstrong/twitch-channel-points-miner/tags?name=${version})

          \`\`\`bash
          docker pull zacharmstrong/twitch-channel-points-miner:${version}
          \`\`\`
          <!-- docker-image:end -->
          EOF
          )
          gh release edit "${RELEASE_TAG}" --notes "${release_notes}"$'\n\n'"${docker_notes}"

      - name: Image digest AMD64 and ARM64
        run: echo ${{ steps.docker_build.outputs.digest }}
