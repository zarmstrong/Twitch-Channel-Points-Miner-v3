name: Publish Docker image

on:
  workflow_call:
    inputs:
      ref:
        description: Git tag or commit to publish
        required: true
        type: string

env:
  DOCKERHUB_NAMESPACE: ${{ vars.DOCKERHUB_NAMESPACE || 'rdavidoff' }}

jobs:
  deploy-docker:
    name: Deploy Docker Hub
    runs-on: ubuntu-latest
    steps:
      - name: Checkout source
        uses: actions/checkout@v6
        with:
          ref: ${{ inputs.ref }}

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Login to DockerHub
        uses: docker/login-action@v4
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_TOKEN }}

      - name: Docker meta
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: ${{ env.DOCKERHUB_NAMESPACE }}/twitch-channel-points-miner-v2
          tags: |
            type=semver,pattern={{version}},value=${{ inputs.ref }}
            type=raw,value=latest

      - name: Build and push AMD64, ARM64, ARMv7
        id: docker_build
        uses: docker/build-push-action@v7
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          platforms: linux/amd64,linux/arm64,linux/arm/v7
          cache-from: type=gha
          cache-to: type=gha,mode=max

      # File size exceeds the maximum allowed 25000 bytes
      # - name: Docker Hub Description
      #   uses: peter-evans/dockerhub-description@v2
      #   with:
      #     username: ${{ secrets.DOCKER_USERNAME }}
      #     password: ${{ secrets.DOCKER_TOKEN }}
      #     repository: ${{ env.DOCKERHUB_NAMESPACE }}/twitch-channel-points-miner-v2

      - name: Image digest AMD64, ARM64, ARMv7
        run: echo ${{ steps.docker_build.outputs.digest }}
